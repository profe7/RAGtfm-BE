services:
  postgres:
    image: postgres:16
    container_name: ragtfm-postgres
    environment:
      POSTGRES_DB: ragtfm
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: soiree
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: ragtfm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc
    container_name: ragtfm-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/ragtfm-documents;
      exit 0;
      "

  chroma:
      image: chromadb/chroma:latest
      container_name: ragtfm-chroma
      ports:
        - "8001:8000"
      volumes:
        - chroma_data:/data

  ollama:
    image: ollama/ollama:latest
    container_name: ragtfm-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all

  redis:
    image: redis:alpine
    container_name: ragtfm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build: .
    container_name: ragtfm-worker
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo
    env_file:
      - .env.docker
    depends_on:
      - redis
      - postgres
      - minio
      - chroma
      - ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  api:
    build: .
    container_name: ragtfm-api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres
      - minio
      - minio-init
      - chroma
      - ollama
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  minio_data:
  chroma_data:
  ollama_data:
  redis_data:
